name: Publish release

on:
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    name: Run quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      # NOTE: docs/QUALITY.md identifies prek as the canonical aggregate quality gate.
      - name: Run all quality gates
        run: uv run prek run --all-files

  prepare:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.version.outputs.publish }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read release version
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import subprocess
          import tomllib

          def project_version(data: bytes) -> str:
              return str(tomllib.loads(data.decode())["project"]["version"])

          current = project_version(Path("pyproject.toml").read_bytes())
          lock = tomllib.loads(Path("uv.lock").read_text())
          locked = next(
              str(package["version"])
              for package in lock["package"]
              if package["name"] == "new-feature" and package.get("source") == {"editable": "."}
          )
          if locked != current:
              raise SystemExit(f"pyproject.toml version {current} does not match uv.lock version {locked}")

          publish = os.environ["EVENT_NAME"] == "workflow_dispatch"
          if not publish:
              previous_file = subprocess.run(
                  ["git", "show", f"{os.environ['BEFORE_SHA']}:pyproject.toml"],
                  check=True,
                  capture_output=True,
              ).stdout
              publish = project_version(previous_file) != current

          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              print(f"publish={str(publish).lower()}", file=output)
              print(f"version={current}", file=output)
          PY

  build:
    name: Build distributions
    needs: [prepare, quality]
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: [prepare, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  release:
    name: Create GitHub release
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source and tags
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "${tag}")"
            if [[ "${tag_sha}" != "${RELEASE_SHA}" ]]; then
              echo "${tag} already points to ${tag_sha}, expected ${RELEASE_SHA}" >&2
              exit 1
            fi
          fi
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub release ${tag} already exists"
            exit 0
          fi
          gh release create "${tag}" dist/* \
            --generate-notes \
            --target "${RELEASE_SHA}" \
            --title "${tag}"
