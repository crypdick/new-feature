[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "new-feature"
# Do not edit directly; use `uv version --bump patch` instead.
version = "1.0.0"
description = "Create isolated feature worktrees with allocated runtime environments."
readme = "README.md"
requires-python = ">=3.13"
authors = [
    { name = "Ricardo Decal", email = "public@ricardodecal.com" },
]
keywords = ["codex", "git", "worktree", "automation", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Version Control :: Git",
]
dependencies = [
    "beartype>=0.22.9",
    "filelock>=3.29.7",
    "tomli-w>=1.2.0",
]

[project.urls]
Homepage = "https://github.com/crypdick/new-feature"
Issues = "https://github.com/crypdick/new-feature/issues"
Source = "https://github.com/crypdick/new-feature"

[project.scripts]
new-feature = "new_feature.app:main"

[tool.hatch.build.targets.sdist]
include = [
    "/pyproject.toml",
    "/README.md",
    "/src/new_feature",
]

[tool.hatch.build.targets.wheel]
packages = ["src/new_feature"]

[tool.new-feature]
target_branch = "main"
default_agent = "codex"
agents = { codex = ["codex"], claude = ["claude"] }
push = false
setup = ["uv sync"]
pre_merge = ["uv run pre-commit run --all-files"]
post_merge = ["uv run pre-commit run --all-files"]
teardown = []

[dependency-groups]
dev = [
    "coverage>=7.15.0",
    "detect-secrets>=1.5.0",
    "flynt>=1.0.6",
    "mypy>=2.2.0",
    "pre-commit>=4.6.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.8.0",
    "pyupgrade>=3.21.2",
    "ruff>=0.15.21",
    "vulture>=2.16",
]

[tool.ruff]
line-length = 110
preview = true

