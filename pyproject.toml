ignore = [
    "E501",
    "TRY003",
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
"src/new_feature/__init__.py" = ["RUF067"]
"tests/**/*.py" = ["ALL"]
"scripts/**/*.py" = ["C901", "PLR0912", "PLR0915", "S603", "S607", "T20"]
"src/new_feature/agent.py" = ["S404", "S603", "TC001", "TC003"]
"src/new_feature/allocator.py" = ["PLR0913", "TC001"]
"src/new_feature/cli.py" = ["T201"]
"src/new_feature/commands.py" = ["S404", "S602", "S603", "T201", "TC003"]
"src/new_feature/codex_hook.py" = ["S404", "S603", "S607"]
"src/new_feature/config.py" = ["TC003"]
"src/new_feature/feature_state.py" = ["TC001", "TC003"]
"src/new_feature/git.py" = ["S404", "S603", "S607"]
"src/new_feature/gitignore.py" = ["TC003"]
"src/new_feature/manifest.py" = ["TC003"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
strict = true
warn_return_any = true
warn_unused_configs = true
show_error_codes = true
pretty = true
disable_error_code = ["no-untyped-call", "no-untyped-def"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_untyped_calls = false
check_untyped_defs = false
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--no-header -n auto -q --durations=5 --durations-min=1.0 --cov=new_feature --cov-report=term-missing --cov-report=html --cov-fail-under=100 --failed-first"
timeout = 20
timeout_method = "thread"

[tool.coverage.run]
branch = true
source = ["new_feature"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/conftest.py",
]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "@abc.abstractmethod",
]

[tool.vulture]
min_confidence = 80
exclude = [".venv/"]
paths = ["src", "tests"]
